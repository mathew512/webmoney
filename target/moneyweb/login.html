<!DOCTYPE html>
<html>
<head>
    <title>Login - MoneyWeb</title>
    <style>
        body { font-family: Arial; margin: 40px; background-color: #f4f6f8; }
        header { background-color: #3498db; color: white; padding: 15px; text-align: center; }
        section { margin-top: 20px; padding: 20px; background: white; border-radius: 5px; text-align: center; }
        input[type=text] { padding: 8px; margin: 10px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        input[type=submit] { background-color: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        input[type=submit]:hover { background-color: #217dbb; }
        a { color: #27ae60; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <header><h1>Login to MoneyWeb</h1></header>
    <section>
        <form action="login" method="post">
            <input type="text" name="username" placeholder="Enter Username" required><br>
            <input type="submit" value="Login">
        </form>
    </section>
    <section>
        <a href="welcome">&larr; Back to Welcome</a>
    </section>
</body>
</html>
